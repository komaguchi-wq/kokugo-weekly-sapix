<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Weekly SapiX 国語</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ホーム（単元一覧） -->
  <header id="app-header">
    <button id="back-btn" class="back-btn" hidden>‹ もどる</button>
    <h1 id="app-title">📘 Weekly SapiX 国語</h1>
    <span class="portal-nav">
      <a class="portal-link" href="https://komaguchi-wq.github.io/study-portal/">🏠 学習ポータルTOPへ</a>
      <a class="portal-link" href="https://komaguchi-wq.github.io/kokugo/">📖 国語トップ</a>
    </span>
  </header>

  <main id="home" class="screen">
    <div id="unit-list"><p class="loading">読み込み中…</p></div>
  </main>

  <!-- 単元詳細 -->
  <main id="detail" class="screen" hidden>
    <div class="detail-bar">
      <h2 id="detail-title"></h2>
      <div class="tabs">
        <button class="tab active" data-view="question">問題</button>
        <button class="tab" data-view="answer">解答</button>
        <button id="print-btn" class="print-btn">🖨 印刷</button>
      </div>
    </div>
    <p id="view-note" class="view-note"></p>
    <div id="page-stack" class="page-stack"></div>
  </main>

  <!-- 拡大ライトボックス -->
  <div id="lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close">✕ とじる</button>
    <div class="lightbox-scroll"><img id="lightbox-img" alt="拡大"></div>
  </div>

  <!-- 印刷専用コンテナ -->
  <div id="print-container"></div>

  <script src="app.js?v=3"></script>
</body>
</html>
